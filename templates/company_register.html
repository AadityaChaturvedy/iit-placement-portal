{% extends "base.html" %}

{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-7 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Company Registration</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('company_register') }}" id="compRegForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="company_name" class="form-label">Company Name *</label>
                            <input type="text" class="form-control" id="company_name" name="company_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password *</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirm *</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hr_contact" class="form-label">HR Contact Number *</label>
                            <input type="tel" class="form-control" id="hr_contact" name="hr_contact" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="website" class="form-label">Website</label>
                            <input type="url" class="form-control" id="website" name="website" placeholder="https://...">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="industry" class="form-label">Industry</label>
                        <select class="form-select" id="industry" name="industry">
                            <option value="">-- Select --</option>
                            <option value="IT/Software">IT / Software</option>
                            <option value="Finance">Finance / Banking</option>
                            <option value="Consulting">Consulting</option>
                            <option value="Manufacturing">Manufacturing</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="E-Commerce">E-Commerce</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Brief Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"
                                  placeholder="Tell us about your company..."></textarea>
                    </div>

                    <div class="alert alert-info py-2">
                        <strong>Note:</strong> Your account will be reviewed by the admin team before being activated.
                    </div>

                    <button type="submit" class="btn btn-success w-100">Register Company</button>
                </form>

                <div class="mt-3 text-center">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('compRegForm').addEventListener('submit', function(e) {
    var enteredPassword = document.getElementById('password').value;
    var confirmedPassword = document.getElementById('confirm_password').value;
    if (enteredPassword !== confirmedPassword) {
        e.preventDefault();
        alert('Passwords don\'t match');
    }
});
</script>
{% endblock %}
