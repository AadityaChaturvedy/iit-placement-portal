{% extends "base.html" %}

{% block title %}Post New Job{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>Post New Job</h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('company_dashboard') }}">Dashboard</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('company_jobs') }}">Jobs</a></li>
                <li class="breadcrumb-item active">Create</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Job Details</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('company_create_job') }}">
                    <div class="mb-3">
                        <label for="job_title" class="form-label">Job Title *</label>
                        <input type="text" class="form-control" id="job_title"
                               name="job_title" required
                               placeholder="e.g., Software Engineer">
                    </div>

                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description *</label>
                        <textarea class="form-control" id="job_description"
                                  name="job_description" rows="5" required
                                  placeholder="Describe the role, responsibilities, and requirements..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                        <textarea class="form-control" id="eligibility_criteria"
                                  name="eligibility_criteria" rows="3"
                                  placeholder="e.g., Minimum CGPA 7.0, B.Tech in CS/IT"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="required_skills" class="form-label">Required Skills</label>
                        <input type="text" class="form-control" id="required_skills"
                               name="required_skills"
                               placeholder="e.g., Python, Java, SQL, Machine Learning">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="experience_required" class="form-label">Experience Required</label>
                            <input type="text" class="form-control" id="experience_required"
                                   name="experience_required"
                                   placeholder="e.g., 0-2 years or Freshers">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="salary_range" class="form-label">Salary Range</label>
                            <input type="text" class="form-control" id="salary_range"
                                   name="salary_range"
                                   placeholder="e.g., 6-8 LPA">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="application_deadline" class="form-label">Application Deadline *</label>
                        <input type="date" class="form-control" id="application_deadline"
                               name="application_deadline" required>
                    </div>

                    <div class="alert alert-info">
                        <strong>Heads up:</strong> This job goes to the admin review queue first.
                        Students can apply after it is approved.
                    </div>

                    <button type="submit" class="btn btn-primary">Post Job</button>
                    <a href="{{ url_for('company_jobs') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
