{% extends "base.html" %}

{% block title %}Edit Job{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>Edit Job Posting</h2>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('company_dashboard') }}">Dashboard</a></li>
                <li class="breadcrumb-item"><a href="{{ url_for('company_jobs') }}">Jobs</a></li>
                <li class="breadcrumb-item active">Edit</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Edit Job Details</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('company_edit_job', job_id=job.id) }}">
                    <div class="mb-3">
                        <label for="job_title" class="form-label">Job Title *</label>
                        <input type="text" class="form-control" id="job_title"
                               name="job_title" required value="{{ job.job_title }}">
                    </div>

                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description *</label>
                        <textarea class="form-control" id="job_description"
                                  name="job_description" rows="5" required>{{ job.job_description }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                        <textarea class="form-control" id="eligibility_criteria"
                                  name="eligibility_criteria" rows="3">{{ job.eligibility_criteria or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="required_skills" class="form-label">Required Skills</label>
                        <input type="text" class="form-control" id="required_skills"
                               name="required_skills" value="{{ job.required_skills or '' }}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="experience_required" class="form-label">Experience Required</label>
                            <input type="text" class="form-control" id="experience_required"
                                   name="experience_required" value="{{ job.experience_required or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="salary_range" class="form-label">Salary Range</label>
                            <input type="text" class="form-control" id="salary_range"
                                   name="salary_range" value="{{ job.salary_range or '' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="application_deadline" class="form-label">Application Deadline *</label>
                        <input type="date" class="form-control" id="application_deadline"
                               name="application_deadline" required value="{{ job.application_deadline }}">
                    </div>

                    <button type="submit" class="btn btn-primary">Update Job</button>
                    <a href="{{ url_for('company_jobs') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
