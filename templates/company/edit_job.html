{% extends "base.html" %}

{% block title %}Edit Job{% endblock %}

{% block content %}
<h2 class="mb-3">Edit: {{ job.job_title }}</h2>

<div class="card">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label for="job_title" class="form-label">Job Title</label>
                <input type="text" class="form-control" name="job_title" value="{{ job.job_title }}" required>
            </div>
            
            <div class="mb-3">
                <label for="job_description" class="form-label">Description</label>
                <textarea class="form-control" name="job_description" rows="5" required>{{ job.job_description }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Eligibility</label>
                    <textarea class="form-control" name="eligibility_criteria" rows="2">{{ job.eligibility_criteria or '' }}</textarea>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Skills</label>
                    <textarea class="form-control" name="required_skills" rows="2">{{ job.required_skills or '' }}</textarea>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Experience</label>
                    <input type="text" class="form-control" name="experience_required" value="{{ job.experience_required or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Package</label>
                    <input type="text" class="form-control" name="salary_range" value="{{ job.salary_range or '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Deadline</label>
                    <input type="date" class="form-control" name="application_deadline" value="{{ job.application_deadline }}">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('company_jobs') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
