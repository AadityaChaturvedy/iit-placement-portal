{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<h2 class="mb-3">My Profile</h2>

<div class="card">
    <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data" id="profileForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Student ID</label>
                    <input type="text" class="form-control" value="{{ student.student_id }}" disabled>
                    <div class="form-text">Can't change your ID</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email_display" class="form-label">Email</label>
                    <input type="text" class="form-control" value="{{ student.email }}" disabled id="email_display">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="contact" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="contact" name="contact" value="{{ student.contact }}">
                </div>
            </div>
            
            <hr>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="degree" class="form-label">Degree</label>
                    <input type="text" class="form-control" id="degree" name="degree" 
                           value="{{ student.degree or '' }}" placeholder="B.Tech">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="branch" class="form-label">Branch</label>
                    <input type="text" class="form-control" id="branch" name="branch" 
                           value="{{ student.branch or '' }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="cgpa" class="form-label">CGPA</label>
                    <input type="number" step="0.01" min="0" max="10" class="form-control" 
                           id="cgpa" name="cgpa" value="{{ student.cgpa or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="graduation_year" class="form-label">Graduation Year</label>
                    <input type="number" class="form-control" id="graduation_year" 
                           name="graduation_year" value="{{ student.graduation_year or '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="skills" class="form-label">Skills</label>
                <textarea class="form-control" id="skills" name="skills" rows="2">{{ student.skills or '' }}</textarea>
            </div>
            
            <div class="mb-4">
                <label for="resume" class="form-label">Resume</label>
                {% if student.resume_path %}
                <div class="mb-2">
                    <span class="badge bg-success">Current:</span> 
                    <a href="{{ url_for('static', filename='uploads/resumes/' + student.resume_path) }}" 
                       target="_blank">{{ student.resume_path }}</a>
                </div>
                {% endif %}
                <input type="file" class="form-control" id="resume" name="resume" accept=".pdf,.doc,.docx">
                <div class="form-text">Upload a new file to replace the existing one</div>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Profile</button>
        </form>
    </div>
</div>

<a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary mt-3">← Dashboard</a>
{% endblock %}
