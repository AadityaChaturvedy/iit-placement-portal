{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="text-center mt-5">
    <h3>Welcome, {{ session.username }}</h3>
    <p class="text-muted">Redirecting to your dashboard...</p>
</div>
<script>
// this page shouldn't really be visible, just a fallback
setTimeout(function() {
    {% if session.user_role == 'admin' %}
    window.location = "{{ url_for('admin_dashboard') }}";
    {% elif session.user_role == 'company' %}
    window.location = "{{ url_for('company_dashboard') }}";
    {% else %}
    window.location = "{{ url_for('student_dashboard') }}";
    {% endif %}
}, 500);
</script>
{% endblock %}
