{% extends "base.html" %}

{% block title %}Edit Company{% endblock %}

{% block content %}
<h2 class="mb-3">Edit Company</h2>

<div class="card">
    <div class="card-body p-4">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="company_name" class="form-label">Company Name</label>
                    <input type="text" class="form-control" id="company_name" name="company_name" value="{{ company.company_name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ company.email }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="hr_contact" class="form-label">HR Contact</label>
                    <input type="text" class="form-control" id="hr_contact" name="hr_contact" value="{{ company.hr_contact }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="website" class="form-label">Website</label>
                    <input type="url" class="form-control" id="website" name="website" value="{{ company.website or '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="industry" class="form-label">Industry</label>
                    <input type="text" class="form-control" id="industry" name="industry" value="{{ company.industry or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="approval_status" class="form-label">Approval Status</label>
                    <select class="form-select" id="approval_status" name="approval_status">
                        <option value="Pending" {% if company.approval_status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Approved" {% if company.approval_status == 'Approved' %}selected{% endif %}>Approved</option>
                        <option value="Rejected" {% if company.approval_status == 'Rejected' %}selected{% endif %}>Rejected</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4">{{ company.description or '' }}</textarea>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="is_blacklisted" name="is_blacklisted" {% if company.is_blacklisted %}checked{% endif %}>
                <label class="form-check-label" for="is_blacklisted">Blocked</label>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('admin_companies') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
